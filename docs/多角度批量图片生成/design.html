<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Image Generation Settings</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#2C097F",
              "background-light": "#f6f6f8",
              "background-dark": "#151022",
            },
            fontFamily: { display: "Space Grotesk" },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      input[type="radio"] {
        appearance: none;
        -webkit-appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid #9ca3af;
        transition: all 0.2s ease-in-out;
        margin-right: 0.5rem;
      }
      .dark input[type="radio"] {
        border: 2px solid #6b7280;
      }
      input[type="radio"]:checked {
        border: 6px solid #8b5cf6;
      }
      input[type="radio"]:focus {
        outline: none;
        box-shadow: none;
      }
      .switch {
        position: relative;
        display: inline-block;
        width: 44px;
        height: 24px;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #e5e7eb;
        transition: 0.4s;
        border-radius: 34px;
      }
      .dark .slider {
        background-color: #374151;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 20px;
        width: 20px;
        left: 2px;
        bottom: 2px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
      }
      input:checked + .slider {
        background-color: #8b5cf6;
      }
      input:checked + .slider:before {
        transform: translateX(20px);
      }
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        background: transparent;
        cursor: pointer;
        width: 100%;
      }
      input[type="range"]::-webkit-slider-runnable-track {
        background: #374151;
        height: 4px;
        border-radius: 2px;
      }
      .dark input[type="range"]::-webkit-slider-runnable-track {
        background: #4b5563;
      }
      input[type="range"]::-moz-range-track {
        background: #374151;
        height: 4px;
        border-radius: 2px;
      }
      .dark input[type="range"]::-moz-range-track {
        background: #4b5563;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        margin-top: -8px;
        background-color: #8b5cf6;
        height: 20px;
        width: 20px;
        border-radius: 50%;
        border: 3px solid #111827;
      }
      .dark input[type="range"]::-webkit-slider-thumb {
        background-color: #8b5cf6;
        border: 3px solid #f9fafb;
      }
      input[type="range"]::-moz-range-thumb {
        background-color: #8b5cf6;
        height: 20px;
        width: 20px;
        border-radius: 50%;
        border: 3px solid #111827;
      }
      .dark input[type="range"]::-moz-range-thumb {
        background-color: #8b5cf6;
        border: 3px solid #f9fafb;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
      #agent-toggle:not(:checked) ~ .agent-content {
        display: none;
      }
    </style>

  <body class="font-display bg-background-light dark:bg-background-dark">
    <div class="dark">
      <div class="p-6 min-h-screen text-gray-300 dark:text-gray-300">
        <div class="space-y-8">
          <div>
            <h2 class="text-xl font-bold text-white dark:text-white mb-4">
              Prompt
            </h2>
            <textarea
              class="w-full h-32 bg-gray-800 dark:bg-gray-800 border border-gray-600 dark:border-gray-700 rounded-lg p-3 text-gray-400 dark:text-gray-400 placeholder-gray-500 focus:ring-primary focus:border-primary"
              placeholder="Describe the image you want to create, e.g., A majestic eagle soaring through mountain peaks at golden hour..."
            ></textarea>
          </div>
          <div>
            <div class="flex items-center justify-between mb-2">
              <h2 class="text-xl font-bold text-white dark:text-white">
                Image Agent
              </h2>
              <label class="switch"
                ><input checked="" id="agent-toggle" type="checkbox" /><span
                  class="slider"
                ></span
              ></label>
            </div>
            <div class="agent-content space-y-6">
              <div>
                <label
                  class="text-sm font-medium text-gray-400 dark:text-gray-400 mb-3 block"
                  for="image-count"
                  >Number of images</label
                >
                <div class="flex items-center space-x-6 text-sm">
                  <label class="flex items-center cursor-pointer"
                    ><input
                      checked=""
                      name="image-count"
                      type="radio"
                      value="6"
                    /><span class="font-medium text-gray-300 dark:text-gray-300"
                      >6</span
                    ></label
                  ><label class="flex items-center cursor-pointer"
                    ><input name="image-count" type="radio" value="9" /><span
                      class="font-medium text-gray-300 dark:text-gray-300"
                      >9</span
                    ></label
                  ><label class="flex items-center cursor-pointer"
                    ><input name="image-count" type="radio" value="12" /><span
                      class="font-medium text-gray-300 dark:text-gray-300"
                      >12</span
                    ></label
                  >
                </div>
              </div>
            </div>
          </div>
          <div>
            <h2 class="text-xl font-bold text-white dark:text-white mb-4">
              Settings
            </h2>
            <div class="space-y-6">
              <div>
                <label
                  class="text-sm font-medium text-gray-400 dark:text-gray-400 mb-2 block"
                  >Model</label
                >
                <div class="relative">
                  <div
                    class="flex items-center justify-between w-full p-3 bg-gray-800 dark:bg-gray-800 border border-gray-700 rounded-lg"
                  >
                    <div class="flex items-center space-x-3">
                      <div
                        class="w-8 h-8 rounded-full bg-yellow-500 flex items-center justify-center"
                      >
                        <span
                          class="material-symbols-outlined text-black text-lg"
                          >auto_awesome</span
                        >
                      </div>
                      <span class="font-semibold text-white dark:text-white"
                        >Nano Banana Pro</span
                      ><span
                        class="bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded-md"
                        >HOT</span
                      >
                      <div class="flex items-center text-blue-400">
                        <span class="material-symbols-outlined text-sm"
                          >auto_fix_high</span
                        ><span class="text-sm font-medium">6</span>
                      </div>
                    </div>
                    <span class="material-symbols-outlined text-gray-400"
                      >expand_more</span
                    >
                  </div>
                </div>
              </div>
              <div>
                <label
                  class="text-sm font-medium text-gray-400 dark:text-gray-400 mb-3 block"
                  >Resolution</label
                >
                <div class="flex items-center space-x-6 text-sm">
                  <label class="flex items-center cursor-pointer"
                    ><input
                      checked=""
                      name="resolution"
                      type="radio"
                      value="1k"
                    /><span class="font-medium text-gray-300 dark:text-gray-300"
                      >1K</span
                    ></label
                  ><label class="flex items-center cursor-pointer"
                    ><input name="resolution" type="radio" value="2k" /><span
                      class="font-medium text-gray-300 dark:text-gray-300"
                      >2K</span
                    ></label
                  ><label class="flex items-center cursor-pointer"
                    ><input name="resolution" type="radio" value="4k" /><span
                      class="font-medium text-gray-300 dark:text-gray-300"
                      >4K</span
                    ></label
                  >
                </div>
              </div>
              <div>
                <label
                  class="text-sm font-medium text-gray-400 dark:text-gray-400 mb-3 block"
                  >Ratio</label
                >
                <div class="grid grid-cols-5 gap-y-4 text-sm">
                  <label class="flex items-center cursor-pointer"
                    ><input name="ratio" type="radio" value="auto" /><span
                      class="font-medium text-gray-300 dark:text-gray-300"
                      >Auto</span
                    ></label
                  ><label class="flex items-center cursor-pointer"
                    ><input name="ratio" type="radio" value="1:1" /><span
                      class="font-medium text-gray-300 dark:text-gray-300"
                      >1:1</span
                    ></label
                  ><label class="flex items-center cursor-pointer"
                    ><input name="ratio" type="radio" value="3:4" /><span
                      class="font-medium text-gray-300 dark:text-gray-300"
                      >3:4</span
                    ></label
                  ><label class="flex items-center cursor-pointer"
                    ><input name="ratio" type="radio" value="9:16" /><span
                      class="font-medium text-gray-300 dark:text-gray-300"
                      >9:16</span
                    ></label
                  ><label class="flex items-center cursor-pointer"
                    ><input name="ratio" type="radio" value="4:3" /><span
                      class="font-medium text-gray-300 dark:text-gray-300"
                      >4:3</span
                    ></label
                  ><label class="flex items-center cursor-pointer"
                    ><input
                      checked=""
                      name="ratio"
                      type="radio"
                      value="16:9"
                    /><span class="font-medium text-gray-300 dark:text-gray-300"
                      >16:9</span
                    ></label
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
        <div
          class="mt-8 p-4 bg-gray-800 dark:bg-gray-800 rounded-lg flex items-center justify-between"
        >
          <div>
            <p class="text-sm text-gray-300 dark:text-gray-300">Credits: 818</p>
            <div
              class="flex items-center text-sm text-gray-400 dark:text-gray-400"
            >
              <span>Cost: 6</span
              ><span
                class="material-symbols-outlined text-yellow-500 ml-1 text-base"
                >bolt</span
              >
            </div>
          </div>
          <button
            class="px-5 py-2 border border-gray-600 dark:border-gray-600 rounded-lg text-sm font-semibold text-white dark:text-white hover:bg-gray-700 dark:hover:bg-gray-700"
          >
            Recharge
          </button>
        </div>
      </div>
    </div>
  </body>
